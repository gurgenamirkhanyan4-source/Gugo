			<body><!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Հրավիրատոմս</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(#f6d1dc, #fbe9ef);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

.card {
  background: #ffffff;
  padding: 35px 45px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h1 {
  color: #d94c7a;
  margin-bottom: 10px;
}

.date {
  color: #555;
  font-size: 16px;
  margin-bottom: 25px;
}

#timer {
  font-size: 26px;
  font-weight: bold;
  color: #333;
}

.finish {
  font-size: 34px;
  color: #d94c7a;
}
</style>
</head>

<body>

<div class="card">
  <h1>Դու հրավիրված ես 💖</h1>
  <div class="date">9 մարտ 2026 | 18:00</div>
  <div id="timer"></div>
</div>

<script>
const targetDate = new Date("March 9, 2026 18:00:00").getTime();

const countdown = setInterval(() => {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance <= 0) {
    clearInterval(countdown);
    document.getElementById("timer").innerHTML =
      "<span class='finish'>FINISH 🎉</span>";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("timer").innerHTML =
    days + " օր " + hours + " ժ " + minutes + " ր " + seconds + " վ";
}, 1000);
</script>

</body>
</html><script src="https://unpkg.com/babel-standalone/babel.min.js"></script><script src="https://unpkg.com/react/umd/react.development.js"></script><script src="https://unpkg.com/react-dom/umd/react-dom.development.js"></script><script type="text/babel" data-presets="react"></script></body>
